version: 2
updates:
  # npm dependencies — grouped into one PR per run to keep review light.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dependencies:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps)"

  # Keep the pinned GitHub Actions themselves current (and their security fixes).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "chore(ci)"
